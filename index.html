<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handjet:wght,ELSH@100..900,2&family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="images/questionMark.avif">
</head>
<body>
    <div id="startScreen">
        <h1>Welcome to the Trivia Game!</h1>
        <div id="categories">
            <h5>Select a category</h5>
            <button class="category">General Knowledge</button>
            <button class="category">Sports</button>
            <button class="category">Animals</button>
            <button class="category">History</button>
        <button class="category">Geography</button>
    </div>
        <button id="startButton" class="hidden">Start Game</button>
    </div>
    <div id ="gameScreen" class="hidden">
        <h1>Trivia Game</h1>
        <div id="header">
            <div id="message">
                <h3 id="correct" class='hidden'>Correct</h3>
                <h3 id="wrong" class='hidden'>Wrong</h3>
            </div>
            <h2 id="time">Time: 30</h2>
        </div>
        <div id="qAndA">
            <div id="question">
                <h3>Question Text</h3>
                <h4>(Question Points)</h4>
            </div>
            <div id="answers">
                <button class="answer">Answer 1</button>
                <button class="answer">Answer 2</button>
                <button class="answer">Answer 3</button>
                <button class="answer">Answer 4</button>
            </div>
        </div>
        <h2 id="score">Score: 0</h2>
    </div>
    <div id="endScreen" class="hidden">
        <h1>Game Over!</h1>
        <h2 id="finalScore">Final Score: 0</h2>
        <button id="restartButton">Play Again</button>
        <button id="changeCategoryButton">Change Category</button>
        <h3 id="highScore">High Score: 0</h3>
    </div>
</body>
<script src="script.js"></script>
</html>
