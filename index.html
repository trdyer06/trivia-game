<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trivia Game</h1>
    <div id="header">
        <h2>Question 1</h2>
        <h2>Time: 20</h2>
    </div>
    <div id="qAndA">
        <div id="question">
            <h3>Who painted the Mona Lisa?</h3>
            <h4>(2 points)</h4>
        </div>
            <div id="answers">
                <button class="answer">Leonardo Da Vinci</button>
                <button class="answer">Michelangelo</button>
                <button class="answer">Raphael</button>
                <button class="answer">Donatello</button>
            </div>
        </div>
    </div>
    <h2 id="score">Score: 0</h2>
</body>
</html>
